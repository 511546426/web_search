<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e8a0a8" />
  <meta name="description" content="记录我们的点点滴滴 · 情侣记录站" />
  <title>我们的点滴 💕</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css?v=20260323-2" />
  <link rel="manifest" href="/manifest.json" />
</head>
<body>
  <div class="container" id="authPanel">
    <header>
      <h1>我们的点滴 💕</h1>
      <p>先登录，再记录你们的故事</p>
    </header>

    <section class="auth-card is-active" id="loginCard">
      <div class="section-head">
        <h2>🔐 登录</h2>
      </div>
      <form id="formLogin" class="auth-form">
        <label>用户名 <input type="text" name="username" autocomplete="username" required /></label>
        <label>密码 <input type="password" name="password" autocomplete="current-password" required /></label>
        <div class="auth-actions">
          <button type="submit" class="btn-submit">登录</button>
        </div>
      </form>
      <div class="auth-switch">
        没有账号？
        <button type="button" id="toRegisterBtn" class="auth-link">点击注册</button>
      </div>
    </section>

    <section class="auth-card" id="registerCard" style="display:none;">
      <div class="section-head">
        <h2>✨ 注册</h2>
      </div>
      <form id="formRegister" class="auth-form">
        <label>用户名 <input type="text" name="username" autocomplete="username" required /></label>
        <label>密码 <input type="password" name="password" minlength="6" autocomplete="new-password" required /></label>
        <div class="auth-actions">
          <button type="submit" class="btn-submit">注册</button>
        </div>
      </form>
      <div class="auth-switch">
        已有账号？
        <button type="button" id="toLoginBtn" class="auth-link">返回登录</button>
      </div>
    </section>
  </div>

  <div class="container" id="appShell" style="display:none;">
    <header>
      <h1>我们的点滴 💕</h1>
      <p id="welcomeText">记录在一起的每一天</p>
      <button type="button" class="btn-add" id="btnLogout">退出登录</button>
    </header>

    <div class="hero" id="hero">
      <div class="days" id="daysText">我们在一起 <span id="daysNum">--</span> 天</div>
      <div class="message" id="heroMessage">加载中…</div>
    </div>

    <nav class="tabs">
      <button type="button" class="active" data-tab="anniversaries">纪念日</button>
      <button type="button" data-tab="timeline">时光轴</button>
      <button type="button" data-tab="gallery">相册</button>
      <button type="button" data-tab="notes">悄悄话</button>
    </nav>

    <section id="section-anniversaries" class="section active">
      <div class="section-head">
        <h2>📅 纪念日</h2>
        <button type="button" class="btn-add" id="btnAddAnniversary" data-open="modalAnniversary">＋ 添加纪念日</button>
      </div>
      <div id="anniversariesList" class="section-body"></div>
    </section>

    <section id="section-timeline" class="section">
      <div class="section-head">
        <h2>📖 时光轴</h2>
        <button type="button" class="btn-add" data-open="modalMemory">＋ 添加回忆</button>
      </div>
      <div id="memoriesList" class="section-body"></div>
    </section>

    <section id="section-gallery" class="section">
      <div class="section-head">
        <h2>📷 相册</h2>
        <button type="button" class="btn-add" data-open="modalPhoto">＋ 上传照片</button>
      </div>
      <div id="galleryList" class="gallery section-body"></div>
    </section>

    <section id="section-notes" class="section">
      <div class="section-head">
        <h2>💌 悄悄话</h2>
        <button type="button" class="btn-add" data-open="modalNote">＋ 写悄悄话</button>
      </div>
      <div id="notesList" class="section-body"></div>
    </section>
  </div>

  <!-- 弹窗：添加纪念日 -->
  <div id="modalAnniversary" class="modal" aria-hidden="true">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h3>添加纪念日</h3>
      <form id="formAnniversary">
        <label>名称 <input type="text" name="name" placeholder="如：在一起的日子" required /></label>
        <label>日期 <input type="date" name="date" required /></label>
        <label class="checkbox"><input type="checkbox" name="repeat_yearly" checked /> 每年重复</label>
        <div class="modal-actions">
          <button type="button" class="btn-cancel">取消</button>
          <button type="submit" class="btn-submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 弹窗：添加回忆 -->
  <div id="modalMemory" class="modal" aria-hidden="true">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h3>添加回忆</h3>
      <form id="formMemory">
        <label>内容 <textarea name="content" rows="4" placeholder="写下这一刻的回忆…" required></textarea></label>
        <label>标题（选填） <input type="text" name="title" placeholder="简短标题" /></label>
        <label>心情（选填） <input type="text" name="mood" placeholder="如：开心、感动" /></label>
        <div class="modal-actions">
          <button type="button" class="btn-cancel">取消</button>
          <button type="submit" class="btn-submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 弹窗：写悄悄话 -->
  <div id="modalNote" class="modal" aria-hidden="true">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h3>写悄悄话</h3>
      <form id="formNote">
        <label>内容 <textarea name="content" rows="3" placeholder="想对 TA 说的话…" required></textarea></label>
        <div class="modal-actions">
          <button type="button" class="btn-cancel">取消</button>
          <button type="submit" class="btn-submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 弹窗：上传照片 -->
  <div id="modalPhoto" class="modal" aria-hidden="true">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h3>上传照片</h3>
      <form id="formPhoto">
        <label>选择图片 <input type="file" name="file" accept="image/*" required /></label>
        <label>描述（选填） <input type="text" name="description" placeholder="这张照片的故事" /></label>
        <div class="modal-actions">
          <button type="button" class="btn-cancel">取消</button>
          <button type="submit" class="btn-submit">上传</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 大图查看：点击相册照片可放大并显示照片故事 -->
  <div id="photoLightbox" class="lightbox" aria-hidden="true">
    <div class="lightbox-overlay"></div>
    <div class="lightbox-inner">
      <button type="button" class="lightbox-close" aria-label="关闭">×</button>
      <div class="lightbox-photo-wrap">
        <img id="lightboxImg" src="" alt="" />
      </div>
      <div class="lightbox-caption">
        <span id="lightboxLabel" class="lightbox-label"></span>
        <p id="lightboxDesc" class="lightbox-desc"></p>
      </div>
    </div>
  </div>

  <script src="/js/app.js?v=20260323-1"></script>
</body>
</html>
